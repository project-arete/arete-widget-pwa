# Trust Provider — server role of cp:padi.trust.basic ("Based on DTC Paper").
widget: trust-provider
title: Trust Provider
description: Offers trust levels (1-5) for security, privacy, safety, reliability and resiliency, with an attestation URL — and shows what a connected consumer is requesting.
icon: "🛡"
color: "#9b6ef5"

capabilities:
  - profile: padi.trust.basic
    role: provider

view:
  - type: label
    text: you offer
  - type: meter
    bind: provSecurity
    min: 1
    max: 5
    caption: security
  - type: meter
    bind: provPrivacy
    min: 1
    max: 5
    caption: privacy
  - type: meter
    bind: provSafety
    min: 1
    max: 5
    caption: safety
  - type: meter
    bind: provReliability
    min: 1
    max: 5
    caption: reliability
  - type: meter
    bind: provResiliency
    min: 1
    max: 5
    caption: resiliency
  - type: field
    bind: provAttestation
    caption: attestation URL
  - type: split
  - type: label
    text: consumer requests
  - type: meter
    bind: reqSecurity
    min: 1
    max: 5
    caption: security
  - type: meter
    bind: reqPrivacy
    min: 1
    max: 5
    caption: privacy
  - type: meter
    bind: reqSafety
    min: 1
    max: 5
    caption: safety
  - type: meter
    bind: reqReliability
    min: 1
    max: 5
    caption: reliability
  - type: meter
    bind: reqResiliency
    min: 1
    max: 5
    caption: resiliency
  - type: value
    bind: reqAttestation
    caption: consumer attestation
